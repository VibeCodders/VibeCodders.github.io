<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeCodders - Progetti</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: #0a0a0f;
            color: #e0e0e0;
            line-height: 1.6;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        header {
            padding: 60px 0 40px;
            text-align: center;
        }
        
        h1 {
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #888;
            font-size: 1.1rem;
        }
        
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 24px;
            padding: 40px 0 80px;
        }
        
        .project-card {
            background: #16161e;
            border: 1px solid #2a2a3a;
            border-radius: 12px;
            padding: 28px;
            transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        
        .project-card:hover {
            transform: translateY(-4px);
            border-color: #667eea;
            box-shadow: 0 8px 30px rgba(102, 126, 234, 0.15);
        }
        
        .project-card h2 {
            font-size: 1.4rem;
            margin-bottom: 12px;
            color: #fff;
        }
        
        .project-card p {
            color: #999;
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 16px;
        }
        
        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px;
        }
        
        .tag {
            background: #1e1e2e;
            color: #667eea;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
            border: 1px solid #2a2a3a;
        }
        
        .card-footer {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 0.85rem;
            color: #666;
        }
        
        .card-footer span {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        footer {
            text-align: center;
            padding: 40px 0;
            color: #555;
            font-size: 0.9rem;
            border-top: 1px solid #1a1a2e;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>VibeCodders</h1>
            <p class="subtitle">I nostri progetti</p>
        </header>
        
        <main class="projects-grid">
            <a href="projects/artnet-server/index.html" class="project-card">
                <h2>ArtnetServer</h2>
                <p>Server Art-Net Node scritto in C# (.NET 10.0) per ricevere pacchetti DMX via rete e inoltrarli a interfacce hardware DMX. Supporta modalità GUI, CLI e Headless.</p>
                <div class="tags">
                    <span class="tag">C#</span>
                    <span class="tag">.NET 10</span>
                    <span class="tag">WPF</span>
                    <span class="tag">Art-Net</span>
                    <span class="tag">DMX</span>
                </div>
            </a>
        </main>
        
        <footer>
            <p>VibeCodders - Progetti</p>
        </footer>
    </div>
</body>
</html>
